<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form2.css">
    <title>Document</title>
</head>
<body>

<form  class="form"id="form">
    <p class="In">Change Password</p>
    <label>password</label><br>
    <input id="password1" type="password" placeholder="Enter your password" required><br>
    <span id="error1" style="color: red;"></span><br>
<label>
   Confirm Password</label><br>
    <input id="password2" type="password" placeholder="confirm your password" required><br>
     <span id="error2" style="color: red;"></span><br>
<button class="sign">change password</button><br><br>

</form>


<script>
    const form = document.getElementById("form");
     const pass1 = document.getElementById("password1");
      const pass2 = document.getElementById("password2");
      const errorIn = document.getElementById("error1");
       const errorOut = document.getElementById("error2");
      //  const storedPassword = localStorage.getItems.("userPassword");
      form.addEventListener('submit', function(event){
        event.preventDefault()
        let isValid = false;

        errorIn.textContent = "";
         errorOut.textContent = "";

         if(!/^\d+$/.test(pass1.value.trim())){
            errorIn.textContent="password must contain numbers";
            isValid = false;
         }else if(!/^\d+$/.test(pass2.value.trim())){
            errorOut.textContent="password must contain numbers";
             isValid = false;
            console.log("invalid")
         }else if(pass1.value.length < 6){
            errorIn.textContent="password must at least 6 characters"
            isValid = false;
         }else if(pass2.value.length < 6){
            errorOut.textContent="password must at least 6 characters"
            isValid = false;
         }else if(pass2.value.trim() !== pass1.value.trim() ){
errorOut.textContent="incorrect password"
isValid = false;
         }
         else{
            isValid = true;
 
errorIn.textContent = "";
         errorOut.textContent = "";
         }
         if(isValid){
errorIn.textContent = "";
         errorOut.textContent = "";
        alert("password changed successfully")
         window.location.href="form.html"
         localStorage.setItem("pass2",
            pass2.value
         );
         }


      })
</script>
</body>
</html>
